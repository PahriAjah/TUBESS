<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RESQ - Dashboard Mitra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        resq: {
                            yellow: "#F0C807",
                            navy: "#011837",
                            white: "#FFFFFF"
                        }
                    },
                    fontFamily: { sans: ["Poppins", "sans-serif"] }
                }
            }
        };
    </script>
    <style>
        .screen { display: none; }
        .screen.active { display: block; }
        .nav-link {
            position: relative;
            overflow: hidden;
            transform: translateX(0);
            transition: background-color .2s ease, color .2s ease, box-shadow .2s ease, transform .2s ease, border-color .2s ease;
        }
        .nav-link i,
        .nav-link svg,
        .nav-link span {
            position: relative;
            z-index: 1;
            transition: color .2s ease, transform .2s ease;
        }
        .nav-link::before {
            content: "";
            position: absolute;
            inset: 0;
            background: #011837;
            opacity: 0;
            transform: scaleX(.92);
            transform-origin: left;
            transition: opacity .2s ease, transform .2s ease;
            z-index: 0;
        }
        .nav-link:hover {
            transform: translateX(3px);
        }
        .nav-link:not(.nav-active):hover {
            color: #011837;
        }
        .nav-link:not(.nav-active):hover i,
        .nav-link:not(.nav-active):hover svg,
        .nav-link:not(.nav-active):hover span {
            transform: translateX(2px);
        }
        .nav-active {
            background: #011837;
            color: #fff;
            box-shadow: 0 10px 22px rgba(1, 24, 55, .14);
            font-weight: 600;
            transform: translateX(3px);
        }
        .nav-active::before {
            opacity: 1;
            transform: scaleX(1);
        }
        .nav-active i,
        .nav-active svg {
            color: #fff !important;
            stroke: currentColor !important;
        }
        .nav-link:not(.nav-active) i,
        .nav-link:not(.nav-active) svg {
            color: #9CA3AF;
            stroke: currentColor;
        }
        .nav-link:not(.nav-active):hover i,
        .nav-link:not(.nav-active):hover svg {
            color: #011837;
            stroke: currentColor;
        }
    </style>
</head>
<body class="min-h-screen bg-resq-white font-sans text-resq-navy">
    <div class="flex min-h-screen">
        <aside class="hidden h-screen w-64 shrink-0 flex-col overflow-y-auto border-r border-gray-200 bg-resq-white md:sticky md:top-0 md:flex">
            <div class="flex items-center justify-between p-6">
                <div class="flex min-w-0 items-center space-x-3">
                    <img src="https://ui-avatars.com/api/?name=Faza+Fahri&background=F0C807&color=011837" alt="Profile" class="h-10 w-10 rounded-full object-cover">
                    <div class="min-w-0">
                        <h2 data-partner-store-name class="truncate text-sm font-bold leading-tight text-resq-navy">RESQ Mitra</h2>
                        <p class="truncate text-xs text-gray-500">mitra@resq.com</p>
                    </div>
                </div>
                <i data-lucide="chevron-down" class="h-4 w-4 shrink-0 cursor-pointer text-gray-400"></i>
            </div>

            <nav id="admin-sidebar" class="flex-1 space-y-6 px-4 pb-6"></nav>
            <div class="p-4 border-t border-gray-200">
                <button id="btn-logout-side" class="flex w-full items-center space-x-3 rounded-xl px-3 py-2.5 text-left text-sm font-bold text-red-600 transition-colors hover:bg-red-50">
                    <i data-lucide="log-out" class="h-5 w-5"></i>
                    <span>Keluar</span>
                </button>
            </div>
        </aside>

        <section class="flex min-w-0 flex-1 flex-col">
            <header class="flex h-16 items-center justify-between border-b border-gray-100 bg-white px-4 md:hidden">
                <div>
                    <p class="text-xs font-semibold text-gray-400">RESQ</p>
                    <h1 class="text-base font-bold">Dashboard Mitra</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn-logout" class="grid h-10 w-10 place-items-center rounded-lg border border-red-100 bg-red-50 text-red-600" aria-label="Keluar">
                        <i data-lucide="log-out" class="h-5 w-5"></i>
                    </button>
                    <button id="mobile-menu-toggle" class="grid h-10 w-10 place-items-center rounded-lg border border-gray-200 text-resq-navy" aria-label="Buka menu">
                        <i data-lucide="menu" class="h-5 w-5"></i>
                    </button>
                </div>
            </header>

            <nav id="mobile-admin-sidebar" class="hidden border-b border-gray-100 bg-white px-4 py-3 md:hidden"></nav>

            <main id="admin-screens" class="flex-1 overflow-y-auto p-5 md:p-8"></main>
        </section>
    </div>

    <script type="module" src="./assets/js/admin.js"></script>
</body>
</html>
