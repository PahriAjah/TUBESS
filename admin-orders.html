<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESQ - Pesanan Aktif</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"]},colors:{resqBlue:"#111827",resqYellow:"#FACC15",resqNavy:"#111827",resqSoft:"#fffdf5"}}}};</script>
</head>
<body class="h-screen overflow-hidden bg-[#fafbfc] font-sans text-resqNavy">
    <div class="flex h-screen overflow-hidden">
        <aside class="hidden h-full w-64 shrink-0 flex-col border-r border-yellow-100 bg-resqSoft px-5 py-8 md:flex">
            <div class="px-3"><h1 class="text-2xl font-black tracking-tight text-resqBlue">RESQ</h1><p data-partner-store-name class="mt-2 text-xs font-semibold text-slate-500">Memuat nama toko...</p></div>
            <nav class="mt-12 flex flex-1 flex-col gap-2">
                <a href="admin.html" data-admin-nav="dashboard" class="flex items-center gap-4 rounded-lg px-4 py-3 text-sm font-bold tracking-wide transition"><i data-lucide="layout-grid" class="h-5 w-5"></i><span>Dashboard</span></a>
                <a href="admin-products.html" data-admin-nav="products" class="flex items-center gap-4 rounded-lg px-4 py-3 text-sm font-bold tracking-wide transition"><i data-lucide="utensils" class="h-5 w-5"></i><span>Kelola Produk</span></a>
                <a href="admin-orders.html" data-admin-nav="orders" class="flex items-center gap-4 rounded-lg px-4 py-3 text-sm font-bold tracking-wide transition"><i data-lucide="shopping-bag" class="h-5 w-5"></i><span>Pesanan Aktif</span></a>
                <a href="admin-revenue.html" data-admin-nav="revenue" class="flex items-center gap-4 rounded-lg px-4 py-3 text-sm font-bold tracking-wide transition"><i data-lucide="wallet" class="h-5 w-5"></i><span>Pendapatan</span></a>
            </nav>
            <button id="btn-logout-side" class="flex items-center gap-4 rounded-lg px-4 py-3 text-left text-sm font-semibold tracking-wide text-slate-600 transition hover:bg-slate-100"><i data-lucide="log-out" class="h-5 w-5"></i><span>Logout</span></button>
        </aside>

        <section class="flex min-w-0 flex-1 flex-col overflow-hidden">
            <header class="flex h-20 shrink-0 items-center justify-between border-b border-slate-100 bg-white/90 px-5 md:justify-end md:px-8">
                <button class="grid h-10 w-10 place-items-center rounded-lg bg-slate-100 text-resqBlue md:hidden" aria-label="Open menu"><i data-lucide="menu" class="h-5 w-5"></i></button>
                <div class="flex items-center gap-5">
                    <label class="hidden h-11 w-80 items-center gap-3 rounded-lg bg-slate-100 px-4 text-slate-500 sm:flex"><i data-lucide="search" class="h-5 w-5"></i><input type="search" placeholder="Cari pesanan..." class="w-full bg-transparent text-sm font-medium outline-none placeholder:text-slate-500"></label>
                    <button class="text-slate-500 transition hover:text-resqBlue" aria-label="Notifications"><i data-lucide="bell" class="h-6 w-6"></i></button>
                    <button class="text-slate-500 transition hover:text-resqBlue" aria-label="Settings"><i data-lucide="settings" class="h-6 w-6"></i></button>
                    <img src="https://i.pravatar.cc/80?img=12" alt="Admin RESQ" class="h-8 w-8 rounded-full object-cover ring-2 ring-slate-100">
                    <button id="btn-logout" class="hidden rounded-lg bg-resqBlue px-4 py-2 text-xs font-bold text-white transition hover:bg-slate-700 lg:inline-flex">Logout</button>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-5 md:p-8 lg:p-10">
                <section class="mx-auto max-w-6xl">
                    <div class="mb-10"><h2 class="text-3xl font-black tracking-tight text-resqNavy md:text-4xl">Pesanan Aktif</h2><p id="orders-subtitle" class="mt-3 text-sm font-medium text-slate-500 md:text-base">Memuat data pesanan aktif...</p></div>
                    <section class="mb-10 grid gap-6 sm:grid-cols-3">
                        <article class="rounded-lg border border-slate-100 bg-white p-6 shadow-sm"><p class="text-sm font-bold text-slate-700">Pesanan Aktif</p><p id="orders-active-count" class="mt-6 text-3xl font-black">0</p></article>
                        <article class="rounded-lg border border-slate-100 bg-white p-6 shadow-sm"><p class="text-sm font-bold text-slate-700">Menunggu Pickup</p><p id="orders-waiting-count" class="mt-6 text-3xl font-black">0</p></article>
                        <article class="rounded-lg border border-slate-100 bg-white p-6 shadow-sm"><p class="text-sm font-bold text-slate-700">Nilai Pesanan</p><p id="orders-total-value" class="mt-6 text-3xl font-black">Rp0</p></article>
                    </section>
                    <section class="overflow-hidden rounded-lg border border-slate-100 bg-white shadow-sm">
                        <div class="border-b border-slate-100 px-6 py-6"><h3 class="text-lg font-black text-resqNavy md:text-xl">Daftar Pesanan Aktif</h3></div>
                        <div class="overflow-x-auto">
                            <table class="w-full min-w-[1040px] border-collapse text-left">
                                <thead><tr class="border-b border-slate-100 bg-slate-50/70"><th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">Pelanggan</th><th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">Menu</th><th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">Total</th><th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">Kode</th><th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">Waktu</th><th class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">Status</th></tr></thead>
                                <tbody id="orders-body" class="divide-y divide-slate-100"><tr><td colspan="6" class="px-6 py-10 text-center text-sm font-semibold text-slate-500">Memuat data pesanan...</td></tr></tbody>
                            </table>
                        </div>
                    </section>
                </section>
            </main>
        </section>
    </div>
    <script type="module" src="./assets/js/admin-orders.js"></script>
</body>
</html>
