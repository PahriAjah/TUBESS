<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RESQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./assets/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body class="bg-white text-slate-800 min-h-screen flex justify-center relative overflow-hidden">

    <div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] bg-yellow-200/50 rounded-full filter blur-[80px] -z-10"></div>
    <div class="absolute bottom-[10%] left-[-10%] w-[250px] h-[250px] bg-yellow-200/40 rounded-full filter blur-[80px] -z-10"></div>

    <div class="w-full max-w-md px-8 py-12 flex flex-col h-full z-10">
        
        <!-- Ilustrasi Amplop (Placeholder) -->
        <div class="w-full h-48 flex justify-center items-center mb-4 mt-4">
            <img src="./assets/rafiki-signup.png" alt="Rafiki Sign Up" class="object-contain h-full w-full">
        </div>

        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900 mb-1">Sign Up</h1>
            <p class="text-xs text-slate-500">Create customer or partner account</p>
        </div>

        <!-- Form Inputs -->
        <div class="space-y-4 mb-6">
            <div class="grid grid-cols-2 gap-3 rounded-2xl bg-slate-100 p-1">
                <button id="role-customer" type="button" data-role-option="customer" class="rounded-xl bg-white px-3 py-2.5 text-xs font-bold text-slate-900 shadow-sm transition">Pelanggan</button>
                <button id="role-partner" type="button" data-role-option="partner" class="rounded-xl px-3 py-2.5 text-xs font-bold text-slate-500 transition">Mitra Toko</button>
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="far fa-user text-slate-400"></i>
                </div>
                <input type="text" id="reg-name" placeholder="Name" class="w-full pl-10 pr-4 py-3.5 border border-slate-300 rounded-2xl text-sm focus:outline-none focus:border-yellow-400">
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="far fa-envelope text-slate-400"></i>
                </div>
                <input type="email" id="reg-email" placeholder="Email address" class="w-full pl-10 pr-4 py-3.5 border border-slate-300 rounded-2xl text-sm focus:outline-none focus:border-yellow-400">
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fas fa-lock text-slate-400"></i>
                </div>
                <input type="password" id="reg-password" placeholder="Password" class="w-full pl-10 pr-10 py-3.5 border border-slate-300 rounded-2xl text-sm focus:outline-none focus:border-yellow-400">
                <button type="button" id="toggle-reg-password" class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer" aria-label="Show password">
                    <i class="far fa-eye text-slate-400"></i>
                </button>
            </div>

            <div id="partner-fields" class="hidden space-y-4 rounded-2xl border border-yellow-100 bg-yellow-50/50 p-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-store text-slate-400"></i>
                    </div>
                    <input type="text" id="reg-store-name" placeholder="Nama toko" class="w-full pl-10 pr-4 py-3.5 border border-slate-300 rounded-2xl text-sm focus:outline-none focus:border-yellow-400">
                </div>

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-phone text-slate-400"></i>
                    </div>
                    <input type="tel" id="reg-store-phone" placeholder="Nomor telepon toko" class="w-full pl-10 pr-4 py-3.5 border border-slate-300 rounded-2xl text-sm focus:outline-none focus:border-yellow-400">
                </div>

                <div class="relative">
                    <div class="absolute top-3.5 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-location-dot text-slate-400"></i>
                    </div>
                    <textarea id="reg-store-address" rows="3" placeholder="Alamat toko" class="w-full resize-none pl-10 pr-4 py-3.5 border border-slate-300 rounded-2xl text-sm focus:outline-none focus:border-yellow-400"></textarea>
                </div>
            </div>
        </div>

        <p class="text-[10px] text-center text-slate-400 mb-6 px-4">
            By signing up, You are agree to our <span class="text-yellow-500 font-semibold">Terms & Conditions and Privacy Policy</span>
        </p>

        <p id="pesan-error-reg" class="text-red-500 text-xs text-center mb-4 hidden"></p>

        <button id="btn-register" class="w-full bg-[#FACC15] hover:bg-yellow-500 text-slate-900 font-bold py-3.5 rounded-2xl transition-all active:scale-95 mb-6">
            Create account
        </button>

        <div class="mb-6 flex items-center gap-4">
            <div class="h-px flex-1 bg-slate-200"></div>
            <span class="text-xs text-slate-400">Or</span>
            <div class="h-px flex-1 bg-slate-200"></div>
        </div>

        <button id="btn-google-register" class="mb-6 flex w-full items-center justify-center gap-3 rounded-2xl border border-slate-200 bg-white py-3.5 text-sm font-semibold text-slate-800 transition hover:border-slate-300 hover:bg-slate-50 active:scale-95">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5 w-5" alt="Google">
            Continue with Google
        </button>

        <!-- Footer -->
        <div class="mt-auto text-center">
            <p class="text-xs text-slate-500">
                Already have an account? <a href="login.html" class="text-yellow-500 font-bold hover:underline">Sign in</a>
            </p>
        </div>
    </div>

    <script type="module" src="./assets/js/register.js"></script>
</body>
</html>
